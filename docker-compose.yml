services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: leadsignal
      POSTGRES_USER: leadsignal
      POSTGRES_PASSWORD: leadsignal
    ports:
      - "5432:5432"
    volumes:
      - leadsignal-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadsignal -d leadsignal"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - leadsignal-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  leadsignal-postgres:
  leadsignal-valkey:
