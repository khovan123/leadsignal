name: Focused Diagnostics

on:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://leadsignal:test-only@localhost:5432/leadsignal?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false --reporter=silent
      - name: Capture build
        continue-on-error: true
        shell: bash
        run: |
          pnpm db:generate > diagnostics.log 2>&1
          pnpm build >> diagnostics.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: remaining-typecheck-error
          path: diagnostics.log
      - run: exit 1
