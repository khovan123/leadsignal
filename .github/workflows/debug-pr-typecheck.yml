name: Focused Typecheck

on:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://leadsignal:test-only@localhost:5432/leadsignal?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false --reporter=silent
      - name: Generate Prisma client
        id: prisma
        continue-on-error: true
        shell: bash
        run: |
          pnpm db:generate > diagnostics.log 2>&1
      - name: Typecheck
        id: typecheck
        if: steps.prisma.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          pnpm build >> diagnostics.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: focused-typecheck-diagnostics
          path: diagnostics.log
      - name: Fail on diagnostics
        if: steps.prisma.outcome != 'success' || steps.typecheck.outcome != 'success'
        run: exit 1
