name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: leadsignal
          POSTGRES_USER: leadsignal
          POSTGRES_PASSWORD: leadsignal
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U leadsignal -d leadsignal"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://leadsignal:leadsignal@localhost:5432/leadsignal?schema=public
      CREDENTIAL_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      VALKEY_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:generate
      - run: pnpm build
