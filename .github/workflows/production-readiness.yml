name: Production Readiness

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: leadsignal
          POSTGRES_USER: leadsignal
          POSTGRES_PASSWORD: leadsignal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leadsignal -d leadsignal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://leadsignal:leadsignal@localhost:5432/leadsignal?schema=public
      VALKEY_URL: redis://localhost:6379
      CREDENTIAL_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      JWT_ACCESS_SECRET: ci-access-secret-value-longer-than-thirty-two-characters
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_DAYS: 30
      INTERNAL_API_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:generate
      - name: Apply migrations
        id: migrate
        continue-on-error: true
        run: pnpm db:deploy > migration.log 2>&1
      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build > build.log 2>&1
      - name: Production E2E
        id: e2e
        continue-on-error: true
        run: pnpm --filter @leadsignal/api test:e2e > e2e.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-readiness-logs
          path: |
            migration.log
            build.log
            e2e.log
      - name: Fail when validation failed
        if: steps.migrate.outcome == 'failure' || steps.build.outcome == 'failure' || steps.e2e.outcome == 'failure'
        run: exit 1
