name: Bootstrap LeadSignal MVP

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand MVP source archive
        shell: bash
        run: |
          cat .bootstrap/part-* > /tmp/leadsignal.tar.gz.b64
          base64 --decode /tmp/leadsignal.tar.gz.b64 > /tmp/leadsignal.tar.gz
          tar -xzf /tmp/leadsignal.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit source tree to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement LeadSignal MVP"
          git push origin HEAD:main
