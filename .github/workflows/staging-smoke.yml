name: Staging Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '15 1 * * *'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10
    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_SMOKE_EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL }}
      STAGING_SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
      STAGING_WORKSPACE_ID: ${{ secrets.STAGING_WORKSPACE_ID }}
      STAGING_SMOKE_OAUTH_PROVIDERS: ${{ vars.STAGING_SMOKE_OAUTH_PROVIDERS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify staging secret configuration
        run: |
          test -n "$STAGING_BASE_URL"
          test -n "$STAGING_SMOKE_EMAIL"
          test -n "$STAGING_SMOKE_PASSWORD"
      - name: Run staging smoke checks
        run: node scripts/staging-smoke.mjs
